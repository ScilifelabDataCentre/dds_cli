# Lint Python - Ruff (via prek)
# Ruff replaces both black (formatting) and pylint (linting).
# Hooks are defined in .pre-commit-config.yaml and run via prek.
# ---
# Action failing?
#   Install prek: download from https://github.com/j178/prek/releases
#   Run locally:  prek run --all-files
#   Or directly:  ruff check . && ruff format --check .
#   Auto-fix:     ruff check --fix . && ruff format .
---
name: Ruff

on:
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: j178/prek-action@v1
        with:
          extra-args: --all-files

# Lint Python - Ruff
# Ruff replaces both black (formatting) and pylint (linting).
# ---
# Action failing?
#   - Run `ruff check .` and `ruff format --check .` locally to see issues.
#   - Run `ruff check --fix .` and `ruff format .` to auto-fix.
---
name: Ruff

on:
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff==0.15.2
      - name: Check linting
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
